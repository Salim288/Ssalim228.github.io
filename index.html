<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portfolio — Salim</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #2a2540;
      --surface: #322d4e;
      --border:  rgba(255,255,255,0.1);
      --text:    #f0eeff;
      --muted:   #b0aac8;
      --accent:  #e8e0ff;
      --accent2: #c8bfef;
      --blue:    #d4ceff;
      --sans:    'Raleway', sans-serif;
      --header-h: 64px;
    }

    html { scroll-behavior: smooth; scroll-padding-top: var(--header-h); }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    .page {
      display: none;
      min-height: 100vh;
      flex-direction: column;
      position: relative;
      z-index: 1;
      padding-top: var(--header-h);
      background: var(--bg);
    }
    .page.active { display: flex; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate {
      opacity: 0;
      animation: fadeUp 0.55s ease forwards;
      animation-play-state: paused;
    }
    .page.entering .animate { animation-play-state: running; }
    .d1 { animation-delay: .05s; }
    .d2 { animation-delay: .15s; }
    .d3 { animation-delay: .25s; }
    .d4 { animation-delay: .35s; }
    .d5 { animation-delay: .45s; }
    .d6 { animation-delay: .55s; }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-h);
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 3rem;
      background: rgba(15,14,23,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }
    .nav-logo { font-size: .88rem; font-weight: 700; letter-spacing: .05em; color: var(--accent); }
    .nav-links { display: flex; gap: 0; white-space: nowrap; }
    .nav-btn {
      background: none; border: none; cursor: pointer;
      font-family: var(--sans); font-size: .88rem;
      color: var(--muted); padding: .6rem 1.3rem;
      border-radius: 6px; transition: color .2s;
      position: relative; letter-spacing: .01em;
    }
    .nav-btn::after {
      content: ''; position: absolute;
      bottom: 6px; left: 50%; right: 50%; height: 2px;
      background: rgba(255,255,255,0.6);
      transition: left .25s, right .25s; border-radius: 2px;
    }
    .nav-btn:hover { color: var(--text); }
    .nav-btn:hover::after, .nav-btn.active::after { left: 16%; right: 16%; }
    .nav-btn.active { color: var(--text); font-weight: 600; }

    .burger { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: .3rem; background: none; border: none; }
    .burger span { display: block; width: 22px; height: 2px; background: var(--text); border-radius: 2px; transition: all .25s; }
    .burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .content { flex: 1; padding: 4rem 5rem; width: 100%; }

    .page-footer {
      text-align: center; padding: 1.5rem;
      font-size: .68rem; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,.15); border-top: 1px solid var(--border);
      flex-shrink: 0; position: relative; z-index: 1;
    }

    .page-header { margin-bottom: 3rem; }
    .page-header h1 { font-size: clamp(1.8rem, 5vw, 3.2rem); font-weight: 900; text-transform: uppercase; letter-spacing: -.02em; margin-bottom: .5rem; line-height: 1.05; }
    .page-header h1 span { color: var(--accent); }
    .page-header p { color: var(--muted); font-size: .92rem; font-weight: 300; }

    /* ACCUEIL */
    .hero-eyebrow { font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; color: var(--accent2); margin-bottom: 1.2rem; display: flex; align-items: center; gap: .75rem; }
    .hero-eyebrow::before { content: ''; display: inline-block; width: 32px; height: 1px; background: var(--accent2); }
    .hero-title { font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 900; line-height: 1; letter-spacing: -.03em; margin-bottom: 1.2rem; text-transform: uppercase; }
    .hero-title .line2 { color: var(--accent); }
    .hero-sub { font-size: 1rem; color: var(--muted); font-weight: 300; letter-spacing: .04em; margin-bottom: 3rem; }
    .hero-info { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 3rem; }
    .info-cell { background: var(--surface); padding: 1.5rem 1.8rem; transition: background .25s; position: relative; overflow: hidden; }
    .info-cell::before { content: ''; position: absolute; top: -50%; left: -50%; width: 40%; height: 200%; background: rgba(255,255,255,.03); transform: skewX(-20deg); transition: left .5s; }
    .info-cell:hover { background: rgba(108,99,255,0.08); }
    .info-cell:hover::before { left: 150%; }
    .info-label { font-size: .6rem; text-transform: uppercase; letter-spacing: .15em; color: var(--muted); margin-bottom: .5rem; }
    .info-val { font-size: .92rem; font-weight: 700; }
    .skills-wrap { margin-top: 3rem; }
    .skills-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .18em; color: var(--muted); margin-bottom: 1.2rem; }
    .skills-chips { display: flex; flex-wrap: wrap; gap: .6rem; }
    .chip { font-size: .78rem; padding: .45rem 1.1rem; border-radius: 999px; border: 1px solid rgba(255,255,255,.1); color: var(--muted); background: rgba(255,255,255,.03); cursor: default; transition: all .25s; position: relative; overflow: hidden; }
    .chip::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,.06), transparent); transform: translateX(-100%); transition: transform .4s; }
    .chip:hover::after { transform: translateX(100%); }
    .chip:hover { border-color: var(--blue); color: var(--text); transform: translateY(-2px); }

    /* RÉALISATIONS */
    .page-subtitle { font-size: clamp(1rem, 2.5vw, 1.4rem); font-weight: 700; letter-spacing: -.01em; color: var(--accent2); margin-bottom: 1.8rem; }

    .real-section-wrapper {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px; padding: 2rem; margin-bottom: 1rem;
      box-shadow: 0 4px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.06);
      position: relative; overflow: hidden;
    }
    .real-section-wrapper::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(200,191,239,0
