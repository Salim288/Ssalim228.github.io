<VirtualHost *:443>
	ServerName www.extralab.galaxy-swiss.lan
	ServerAlias extralab.galaxy-swiss.lan

	DocumentRoot /var/www/html

	#configuration SSL
	SSLEngine on
	SSLCertificateFile /etc/ssl/certs/Certificat_GSB_1_2025.crt
	SSLCertificateKeyFile /etc/ssl/private/Certificat_GSB_1_2025.key
	SSLCertificateChainFile /etc/ssl/certs/Certificat_GSB_2025.crt

	#Authentification
	<Directory /var/www/html>
		AuthBasicProvider ldap
		AuthLDAPURL "ldap://192.168.51.247:389/cn=debconf,dc=domain,dc=com"
		AuthLDAPBindDN "cn=deconf,dc=domain,dc=com"
		AuthLDAPBindPassword "P@55aran"
		AuthType Basic
		AuthName "Accès restreint - LDAP"
		AuthUserFile /etc/apache2/.htpasswd
		Require valid-user

		Options Indexes FollowSymLinks
		AllowOverride None
	</Directory>

	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
